<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de metas de venda de veículos</title>

    <link rel="stylesheet" href="Style.css">
</head>

<body>

    <div class="container">

        <!-- CABEÇALHO -->
        <header>
            <h1 id="titulo">
                Controle de metas de <br>
                vendas de veiculos
            </h1>
            <br>
            <hr>
            <br>
        </header>

        <!-- TODO O CONTEÚDO -->
        <main class="card">

            <!-- FORMULÁRIO DE PREENCHIMENTO -->
            <section class="formulario">
                <form>

                    <div class="entrada_dados">
                        <h3 class="descricao_input">Nome da meta</h3>
                        <input type="text" id="nome_meta" placeholder="Dê um nome coerente para a sua meta" required>
                    </div>

                    <br>

                    <div class="entrada_dados">
                        <h3 class="descricao_input">Valor da meta desejada</h3>
                        <input type="number" id="meta_definida" placeholder="Defina um valor para a sua meta" required>
                    </div>

                    <br>

                    <div class="entrada_dados">
                        <h3 class="descricao_input">Valor atingido até o momento</h3>
                        <input type="number" id="valor_atual_meta" placeholder="Digite o total já vendido" required>
                    </div>

                </form>
            </section>

            <br>
            <hr>
            <br>

            <!-- BOTÃO SALVAR -->
            <section class="formulario">

                <button id="salvar_meta" type="button">
                    <strong>Salvar Meta</strong>
                </button>

                <h6 id="relogio"></h6>

            </section>

            <br>
            <hr>
            <br>

            <!-- TOTAL ARRECADADO -->
            <section class="valor_atual_arrecadado">

                <div class="valor">
                    <h2>Meta Atual</h2>
                    <h3 id="valor_total_meta">R$0,00</h3>
                </div>

                <div class="valor">
                    <h2>Total Arrecadado</h2>
                    <h3 id="valor_total_arrecadado">R$0,00</h3>
                </div>

                <div class="valor">
                    <h2>Adquirido a Mais</h2>
                    <h3 id="valor_total_arrecadado_alem_meta" style="color: lightcoral;">R$0,00</h3>
                </div>

            </section>

            <br>
            <br>

            <!-- FILTRO -->
            <section class="filtro-container">

                <h4>Filtrar por Nome</h4>

                <select id="filtro_letra" onchange="filtrarPorLetra(this.value)">
                    <option value="">Todos</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                    <option value="G">G</option>
                    <option value="H">H</option>
                    <option value="I">I</option>
                    <option value="J">J</option>
                    <option value="K">K</option>
                    <option value="L">L</option>
                    <option value="M">M</option>
                    <option value="N">N</option>
                    <option value="O">O</option>
                    <option value="P">P</option>
                    <option value="Q">Q</option>
                    <option value="R">R</option>
                    <option value="S">S</option>
                    <option value="T">T</option>
                    <option value="U">U</option>
                    <option value="V">V</option>
                    <option value="W">W</option>
                    <option value="X">X</option>
                    <option value="Y">Y</option>
                    <option value="Z">Z</option>
                </select>

            </section>
            <br>
            <hr>

            <!-- LISTA -->
            <section>
                <ul id="lista_metas"></ul>
            </section>

        </main>

    </div>
    <!-- SCRIPT PARA RODAR A PARTE AUTOMÁTICA -->
    <script src="Script.js"></script>

</body>

</html>
